name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test ./... -v -count=1

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install kind
        run: |
          [ $(uname -m) = x86_64 ] && curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64
          [ $(uname -m) = aarch64 ] && curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-arm64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Run e2e tests
        run: go test -tags=e2e -v -count=1 -timeout=20m ./test/e2e/...

      - name: Upload kuery logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kuery-e2e-logs
          path: /tmp/kuery-e2e-*/kuery.log
          retention-days: 7

      - name: Cleanup kind clusters
        if: always()
        run: |
          kind delete cluster --name kuery-e2e-alpha 2>/dev/null || true
          kind delete cluster --name kuery-e2e-beta 2>/dev/null || true
