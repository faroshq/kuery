name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test ./... -v -count=1

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # No kind/kubectl install needed — testcontainers manages K3s containers.
      # Docker is available by default on ubuntu-latest.

      - name: Run e2e tests (K3s + PostgreSQL via testcontainers)
        run: go test -tags=e2e -v -count=1 -timeout=20m ./test/e2e/...

      - name: Upload kuery logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kuery-e2e-logs
          path: /tmp/kuery-e2e-*/kuery.log
          retention-days: 7
